<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مودا - متجر الأزياء العصري. اكتشف أحدث صيحات الموضة لعام 2024 واستمتع بتجربة تسوق فريدة.">
    <title>مودا - متجر الأزياء العصري</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand">
            <img src="https://i.imgur.com/AjS0DYI.png" alt="شعار المتجر" class="site-logo">
        </a>
        
        <nav>
            <a href="index.html" data-key="products">المجموعات</a>
            <a href="cart.html" data-key="cart">السلة</a>
        </nav>

        <div class="header-actions">
            <div class="language-switcher">
                <button id="englishBtn">EN</button>
                <button id="arabicBtn" class="active">AR</button>
            </div>
            <div class="cart-icon" onclick="goToCart()">
                🛍️
                <span id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="hero-slider">
        <div class="slider-container">
            <div class="slide active">
                <img src="https://i.imgur.com/aUYzU3C.jpg" alt="عرض أزياء فاخرة لمجموعة الخريف 2024">
                <div class="slide-content">
                    <h2 data-key="slide1_title">مجموعة الخريف الحصرية</h2>
                    <p data-key="slide1_text">اكتشف أحدث صيحات الموضة لعام 2024</p>
                    <button class="cta-button" data-key="discover" aria-label="اكتشف مجموعة الخريف الحصرية">اكتشف الآن</button>
                </div>
            </div>
            <div class="slide">
                <img src="https://i.imgur.com/A15Aau3.jpg" alt="فساتين أنيقة بخصومات تصل إلى 50%">
                <div class="slide-content">
                    <h2 data-key="slide2_title">خصومات تصل إلى 50%</h2>
                    <p data-key="slide2_text">أفضل العروض على المنتجات المميزة</p>
                    <button class="cta-button" data-key="shop_offers" aria-label="تسوق العروض">تسوق العروض</button>
                </div>
            </div>
            <div class="slide">
                <img src="https://i.imgur.com/c970hjy.jpg" alt="أحذية عصرية مع شحن مجاني">
                <div class="slide-content">
                    <h2 data-key="slide3_title">شحن مجاني</h2>
                    <p data-key="slide3_text">لجميع الطلبات فوق 500 ريال</p>
                    <button class="cta-button" data-key="start_shopping" aria-label="ابدأ التسوق">إبدأ التسوق</button>
                </div>
            </div>
        </div>
        <div class="slider-dots"></div>
    </div>

    <main class="products-container">
        <h2 class="section-title" data-key="latest_products">أحدث المنتجات</h2>
        <section class="products" id="products"></section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
